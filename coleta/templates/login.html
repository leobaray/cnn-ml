<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login | CNN Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 400px; width: 100%; }
  </style>
</head>
<body>
<main class="login-card">
  <div class="card">
    <div class="brand" style="text-align:center; font-size:1.5rem; margin-bottom: 20px;">📸 CNN Photos</div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash">
          {% for category, msg in messages %}
            <div class="flash-item flash-{{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-full">Entrar</button>
    </form>
  </div>
</main>
</body>
</html>
